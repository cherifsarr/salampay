#===============================================================================
# Apache2 Virtual Host Configuration for SalamPay
# Domain: salampay.com, api.salampay.com
# Server: EC2 (same as salamticket.net)
#===============================================================================

# Redirect HTTP to HTTPS
<VirtualHost *:80>
    ServerName salampay.com
    ServerAlias www.salampay.com api.salampay.com

    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# Main HTTPS Virtual Host
<VirtualHost *:443>
    ServerName salampay.com
    ServerAlias www.salampay.com

    DocumentRoot /var/www/salampay/current/public

    # SSL Configuration (Let's Encrypt)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/salampay.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/salampay.com/privkey.pem

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    <Directory /var/www/salampay/current/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Laravel URL Rewriting
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^ index.php [L]
        </IfModule>
    </Directory>

    # PHP-FPM Configuration
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php/php8.3-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/salampay_error.log
    CustomLog ${APACHE_LOG_DIR}/salampay_access.log combined

    # Gzip Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/x-javascript
    </IfModule>

    # Static File Caching
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType application/x-font-woff "access plus 1 year"
        ExpiresByType font/woff2 "access plus 1 year"
    </IfModule>
</VirtualHost>

# API Subdomain Virtual Host
<VirtualHost *:443>
    ServerName api.salampay.com

    DocumentRoot /var/www/salampay/current/public

    # SSL Configuration (Let's Encrypt)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/salampay.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/salampay.com/privkey.pem

    # CORS Headers for API
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With"

    # Security Headers
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"

    <Directory /var/www/salampay/current/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Handle OPTIONS preflight requests
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L]

        # Laravel URL Rewriting
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [L]
    </Directory>

    # PHP-FPM Configuration
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php/php8.3-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # API Rate Limiting (requires mod_ratelimit)
    <IfModule mod_ratelimit.c>
        SetOutputFilter RATE_LIMIT
        SetEnv rate-limit 500
    </IfModule>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/salampay_api_error.log
    CustomLog ${APACHE_LOG_DIR}/salampay_api_access.log combined
</VirtualHost>
