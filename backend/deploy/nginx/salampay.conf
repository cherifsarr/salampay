#===============================================================================
# Nginx Configuration for SalamPay
# Domain: salampay.com, www.salampay.com, api.salampay.com
# Server: Same EC2 as salamticket.net
#===============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=salampay_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=salampay_webhook:10m rate=100r/m;

# Upstream for PHP-FPM
upstream salampay_php {
    server unix:/var/run/php/php8.3-fpm.sock;
}

#-------------------------------------------------------------------------------
# HTTP -> HTTPS Redirect
#-------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name salampay.com www.salampay.com api.salampay.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

#-------------------------------------------------------------------------------
# Main Website (salampay.com, www.salampay.com)
#-------------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name salampay.com www.salampay.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/salampay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/salampay.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Document root - Laravel public folder
    root /var/www/salampay/current/backend/public;
    index index.php;

    # Logging
    access_log /var/log/nginx/salampay.access.log;
    error_log /var/log/nginx/salampay.error.log;

    # Redirect www to non-www
    if ($host = www.salampay.com) {
        return 301 https://salampay.com$request_uri;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass salampay_php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }
}

#-------------------------------------------------------------------------------
# API Server (api.salampay.com)
#-------------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.salampay.com;

    # SSL Configuration (same cert with SAN)
    ssl_certificate /etc/letsencrypt/live/salampay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/salampay.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Document root
    root /var/www/salampay/current/backend/public;
    index index.php;

    # Logging
    access_log /var/log/nginx/salampay-api.access.log;
    error_log /var/log/nginx/salampay-api.error.log;

    # CORS headers for API
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-KEY' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Handle preflight requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-KEY';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API rate limiting
    location ~ ^/api/v1/ {
        limit_req zone=salampay_api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Webhook endpoints (higher rate limit)
    location ~ ^/api/v1/webhooks/ {
        limit_req zone=salampay_webhook burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass salampay_php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }
}
